components:
  schemas:
    CreatePhoneRegistrationRequest:
      type: object
      properties:
        phoneNumber:
          type: string
          description: E.164 formatted phone number
        locale:
          type: string
          description: Locale for OTP message (e.g., de-DE)
      required:
      - phoneNumber
    PhoneRegistrationResponse:
      type: object
      properties:
        registrationId:
          type: string
          description: Registration transaction ID
        phoneNumber:
          type: string
          description: Registered phone number
        status:
          type: string
          description: Current status (e.g., PENDING_VERIFICATION)
        expiresAt:
          type: string
          description: OTP expiration timestamp (ISO 8601)
    VerifyPhoneRegistrationRequest:
      type: object
      properties:
        registrationId:
          type: string
          description: Registration transaction ID
        otpCode:
          type: string
          description: One-time verification code
      required:
      - registrationId
      - otpCode
    PhoneVerificationResponse:
      type: object
      properties:
        userId:
          type: string
          description: Created user ID
        phoneNumber:
          type: string
          description: Verified phone number
        status:
          type: string
          description: Current status (e.g., VERIFIED)
        verifiedAt:
          type: string
          description: Verification timestamp (ISO 8601)
    EnableTwoFactorRequest:
      type: object
      properties:
        deliveryMethod:
          type: string
          description: Preferred delivery method for the 6-digit PIN (e.g., sms, email,
            app)
      required:
      - deliveryMethod
    EnableTwoFactorResponse:
      type: object
      properties:
        twoFactorEnabled:
          type: boolean
          description: Indicates whether 2FA is enabled
        challengeId:
          type: string
          description: Identifier for the 2FA challenge
    VerifyTwoFactorRequest:
      type: object
      properties:
        challengeId:
          type: string
          description: Identifier for the 2FA challenge
        pin:
          type: string
          description: 6-digit PIN
      required:
      - challengeId
      - pin
    VerifyTwoFactorResponse:
      type: object
      properties:
        verified:
          type: boolean
          description: Indicates whether the PIN was verified
        accessToken:
          type: string
          description: Access token issued after successful verification
        refreshToken:
          type: string
          description: Refresh token issued after successful verification
    DisableTwoFactorRequest:
      type: object
      properties:
        pin:
          type: string
          description: 6-digit PIN to confirm disabling 2FA
      required:
      - pin
    DisableTwoFactorResponse:
      type: object
      properties:
        twoFactorEnabled:
          type: boolean
          description: Indicates whether 2FA is enabled
    RegisterBiometricRequest:
      type: object
      properties:
        biometricType:
          type: string
          description: Type of biometric credential (e.g., FINGERPRINT, FACE_ID)
        biometricToken:
          type: string
          description: Device-generated biometric token or public key reference
        deviceId:
          type: string
          description: Device identifier
        deviceName:
          type: string
          description: Human-readable device name
      required:
      - biometricType
      - biometricToken
      - deviceId
    RegisterBiometricResponse:
      type: object
      properties:
        biometricId:
          type: string
          description: Biometric credential ID
        status:
          type: string
          description: Enrollment status
    VerifyBiometricRequest:
      type: object
      properties:
        biometricId:
          type: string
          description: Biometric credential ID
        biometricAssertion:
          type: string
          description: Signed biometric assertion from device
        deviceId:
          type: string
          description: Device identifier
      required:
      - biometricId
      - biometricAssertion
      - deviceId
    VerifyBiometricResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: Access token issued after successful verification
        expiresIn:
          type: integer
          description: Token expiration in seconds
    ListBiometricsResponse:
      type: object
      properties:
        items:
          type: array
          description: List of biometric credentials
        page:
          type: integer
          description: Current page number
        pageSize:
          type: integer
          description: Items per page
        totalItems:
          type: integer
          description: Total number of items
    DeleteBiometricResponse:
      type: object
      properties:
        status:
          type: string
          description: Deletion status
    CreateSessionRequest:
      type: object
      properties:
        username:
          type: string
          description: User login name
        password:
          type: string
          description: User password
        deviceId:
          type: string
          description: Unique device identifier
        deviceName:
          type: string
          description: Human-readable device name
        deviceType:
          type: string
          description: Device type (e.g., mobile, desktop, tablet)
      required:
      - username
      - password
      - deviceId
    SessionResponse:
      type: object
      properties:
        sessionId:
          type: string
          description: Session identifier
        accessToken:
          type: string
          description: Access token
        refreshToken:
          type: string
          description: Refresh token
        expiresIn:
          type: integer
          description: Access token expiration in seconds
        deviceId:
          type: string
          description: Unique device identifier
        createdAt:
          type: string
          description: Session creation timestamp
    SessionListResponse:
      type: object
      properties:
        items:
          type: array
          description: List of active sessions
          items:
            type: object
            properties:
              sessionId:
                type: string
                description: Session identifier
              deviceId:
                type: string
                description: Unique device identifier
              deviceName:
                type: string
                description: Human-readable device name
              deviceType:
                type: string
                description: Device type
              lastActiveAt:
                type: string
                description: Last activity timestamp
              createdAt:
                type: string
                description: Session creation timestamp
        page:
          type: integer
          description: Current page number
        pageSize:
          type: integer
          description: Items per page
        totalItems:
          type: integer
          description: Total number of sessions
    PasskeyRegistrationOptionsRequest:
      type: object
      properties:
        userId:
          type: string
          description: User ID for which to create registration options
        displayName:
          type: string
          description: User-friendly name displayed by authenticators
        attestation:
          type: string
          description: Attestation conveyance preference (e.g., none, indirect, direct)
      required:
      - userId
      - displayName
    PasskeyRegistrationOptionsResponse:
      type: object
      properties:
        challenge:
          type: string
          description: Base64url-encoded challenge
        rp:
          type: object
          description: Relying party information
        user:
          type: object
          description: User identity information
        pubKeyCredParams:
          type: array
          description: Supported public key credential parameters
        timeout:
          type: integer
          description: Timeout in milliseconds
        excludeCredentials:
          type: array
          description: Credentials to exclude
    PasskeyRegistrationVerifyRequest:
      type: object
      properties:
        userId:
          type: string
          description: User ID completing registration
        credential:
          type: object
          description: WebAuthn attestation response from client
        deviceName:
          type: string
          description: Optional label for the passkey device
      required:
      - userId
      - credential
    PasskeyRegistrationVerifyResponse:
      type: object
      properties:
        passkeyId:
          type: string
          description: Registered passkey ID
        createdAt:
          type: string
          description: Creation timestamp
    PasskeyAuthenticationOptionsRequest:
      type: object
      properties:
